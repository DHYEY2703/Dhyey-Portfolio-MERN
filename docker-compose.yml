version: '3.8'

services:
  frontend:
    build:
      context: .
      args:
        # Pulls the backend URL from the server's .env file, defaults to local dev mapping
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5001}
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./server
    ports:
      - "5001:5000"
    environment:
      # Security Fix: Never hardcode passwords in docker-compose! Read them from a .env file on the deployment server
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/portfolio}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PORT=5000
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
