version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./server
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/portfolio
      - JWT_SECRET=93d6bdc31d61effd93b8622d3987d5339ba5ee701b0f501f3d07577e2ba7caa0
      - ADMIN_PASSWORD=dhyey@admin123
      - PORT=5000
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
